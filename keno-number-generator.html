    body {
      font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', sans-serif;
      background: #0f1923;
      color: #e8eaf0;
      min-height: 100vh;

    .card {
      background: #19242f;

    }

      font-size: 13px;
      color: #6b7d8e;
      margin-bottom: 1.75rem;
    }

    .label {
      font-size: 12px;
      font-weight: 500;
      text-transform: uppercase;
      letter-spacing: 1px;
      color: #6b7d8e;
      margin-bottom: 10px;
    }

    .count-row {
      display: flex;
      gap: 8px;
      flex-wrap: wrap;
      margin-bottom: 1.75rem;
    }

    .count-btn {
      border: 1px solid #2a3a4a;
      background: #222f3a;
      color: #9ab0c4;
      border-radius: 8px;
      padding: 8px 16px;
      font-size: 15px;
      font-weight: 500;
      cursor: pointer;
      transition: all 0.15s;
    }

    .count-btn:hover {
      background: #2a3a4a;
      color: #e8eaf0;
    }

    .count-btn.active {
      background: #1565c0;
      border-color: #1976d2;
      color: #e3f2fd;
    }

    .drawn-label {
      font-size: 12px;
      color: #6b7d8e;
      margin-bottom: 12px;
      min-height: 16px;
    }

    .balls-grid {
      display: grid;
      grid-template-columns: repeat(auto-fill, minmax(54px, 1fr));
      gap: 10px;
      margin-bottom: 1.75rem;
      min-height: 64px;
    }

    .ball {
      width: 54px;
      height: 54px;
      border-radius: 50%;
      display: flex;
      align-items: center;
      justify-content: center;
      font-size: 16px;
      font-weight: 600;
      border: 1px solid #2a3a4a;
      background: #222f3a;
      color: #4a5a6a;
      transition: all 0.3s;
    }

    .ball.drawn {
      background: #1565c0;
      border-color: #1976d2;
      color: #e3f2fd;
      box-shadow: 0 0 12px rgba(21, 101, 192, 0.4);
    }

    @keyframes pop {
      0%   { transform: scale(0.4); opacity: 0; }
      60%  { transform: scale(1.18); }
      100% { transform: scale(1); opacity: 1; }
    }

    .ball.pop { animation: pop 0.35s cubic-bezier(0.34, 1.56, 0.64, 1) both; }

      width: 100%;
      border: 1px solid #2a3a4a;
      background: #222f3a;

      font-weight: 500;

    }

<body>
  <div class="card">
    <h1>Keno Generator</h1>
    <p class="subtitle">Pick your spot count, then draw your numbers.</p>

    <div class="label">How many numbers?</div>
    <div class="count-row" id="count-row"></div>

    <div class="drawn-label" id="drawn-label"></div>
    <div class="balls-grid" id="balls-grid"></div>

    <button class="gen-btn" onclick="generate()">Draw numbers</button>

    <div class="history" id="history" style="display:none;">
      <div class="label" style="margin-bottom:8px;">Previous draws</div>
      <div id="hist-list"></div>
    </div>
  </div>

  <script>
    let selected = 8;
    let historyArr = [];
    const counts = [4, 5, 6, 7, 8, 9, 10];
    const row = document.getElementById('count-row');

    counts.forEach(n => {
      const b = document.createElement('button');
      b.className = 'count-btn' + (n === selected ? ' active' : '');
      b.textContent = n;
      b.onclick = () => {
        selected = n;
        document.querySelectorAll('.count-btn').forEach(x => x.classList.remove('active'));
        b.classList.add('active');
        document.getElementById('balls-grid').innerHTML = '';
        document.getElementById('drawn-label').textContent = '';
      };
      row.appendChild(b);
    });

    function generate() {
      const pool = Array.from({ length: 80 }, (_, i) => i + 1);
      const nums = [];
      while (nums.length < selected) {
        const idx = Math.floor(Math.random() * pool.length);
        nums.push(pool.splice(idx, 1)[0]);
      }
      nums.sort((a, b) => a - b);

      const grid = document.getElementById('balls-grid');
      grid.innerHTML = '';
      document.getElementById('drawn-label').textContent = selected + ' numbers drawn from 1–80';

      nums.forEach((n, i) => {
        const ball = document.createElement('div');
        ball.className = 'ball';
        ball.textContent = n;
        grid.appendChild(ball);
        setTimeout(() => ball.classList.add('drawn', 'pop'), i * 80);
      });

      historyArr.unshift(nums);
      if (historyArr.length > 5) historyArr.pop();
      renderHistory();
    }

    function renderHistory() {
      const hist = document.getElementById('history');
      const list = document.getElementById('hist-list');
      if (historyArr.length === 0) { hist.style.display = 'none'; return; }
      hist.style.display = 'block';
      list.innerHTML = '';
      historyArr.forEach((nums, i) => {
        const r = document.createElement('div');
        r.className = 'hist-row';
        r.innerHTML = `<span class="hist-label">#${i + 1}</span><span class="hist-nums">${nums.join('  ·  ')}</span>`;
        list.appendChild(r);
      });
    }
  </script></p>
