<html lang="en">
<head>
<meta name="google-adsense-account" content="ca-pub-3209473338250523">
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=yes">
<title>ZAP!</title>
<style>
  @import url('https://fonts.googleapis.com/css2?family=Orbitron:wght@700;900&display=swap');

  :root {
    --yellow: #FFE600;
    --orange: #FF6B00;
    --bg: #0a0a0a;
  }

  * { margin: 0; padding: 0; box-sizing: border-box; }

  body {
    background: var(--bg);
    font-family: 'Orbitron', monospace;
    min-height: 100dvh;
    display: flex;
    flex-direction: column;
    align-items: center;
    justify-content: center;
    overflow: hidden;
    color: var(--yellow);
    touch-action: manipulation;
    transition: background 0.05s;
  }

  #flash-overlay {
    position: fixed;
    inset: 0;
    background: white;
    opacity: 0;
    pointer-events: none;
    z-index: 100;
    transition: opacity 0.02s;
  }

  .device {
    display: flex;
    flex-direction: column;
    align-items: center;
    gap: 10px;
    user-select: none;
  }

  .label {
    font-size: 11px;
    letter-spacing: 4px;
    color: #555;
    text-transform: uppercase;
  }

  /* ── Prongs ── */
  .prongs {
    display: flex;
    justify-content: space-between;
    width: 130px;
    padding: 0 18px;
    margin-bottom: -3px;
    position: relative;
    z-index: 2;
  }

  .prong {
    width: 14px;
    height: 44px;
    background: linear-gradient(180deg, #bbb, #888);
    border-radius: 3px 3px 0 0;
    position: relative;
  }

  /* Arc between prongs */
  .arc {
    position: absolute;
    top: -18px;
    left: 50%;
    transform: translateX(-50%);
    width: 80px;
    height: 30px;
    pointer-events: none;
    opacity: 0;
  }

  /* ── Main taser body ── */
  .taser-body {
    width: 300px;
    background: linear-gradient(160deg, #2a2a2a 0%, #111 100%);
    border-radius: 60px 60px 40px 40px;
    border: 1px solid #333;
    box-shadow: 0 0 30px rgba(255,230,0,0.05), inset 0 1px 0 #444;
    position: relative;
    display: flex;
    flex-direction: column;
    align-items: center;
    padding: 14px 0 24px;
    gap: 14px;
  }

  .voltage-display {
    font-size: 8px;
    letter-spacing: 2px;
    color: #555;
    white-space: nowrap;
  }

  /* ── Trigger button — embedded in taser body ── */
  .trigger-btn {
    width: 100px;
    height: 100px;
    border-radius: 50%;
    background: radial-gradient(circle at 35% 35%, #FF6B00, #cc3300);
    border: 3px solid #ff4400;
    box-shadow: 0 0 20px rgba(255,100,0,0.4), inset 0 2px 4px rgba(255,255,255,0.2);
    cursor: pointer;
    font-family: 'Orbitron', monospace;
    font-size: 13px;
    font-weight: 900;
    letter-spacing: 2px;
    color: white;
    text-shadow: 0 0 8px rgba(0,0,0,0.6);
    transition: transform 0.05s, box-shadow 0.05s;
    -webkit-tap-highlight-color: transparent;
    outline: none;
    position: relative;
    z-index: 5;
  }

  .trigger-btn:active,
  .trigger-btn.pressed {
    transform: scale(0.93);
    box-shadow: 0 0 8px rgba(255,100,0,0.2), inset 0 2px 6px rgba(0,0,0,0.4);
  }

  /* Guard ring around button */
  .btn-guard {
    width: 116px;
    height: 116px;
    border-radius: 50%;
    background: #1a1a1a;
    border: 2px solid #333;
    display: flex;
    align-items: center;
    justify-content: center;
    box-shadow: inset 0 2px 8px rgba(0,0,0,0.8);
  }

  .led-row {
    display: flex;
    gap: 7px;
  }

  .led {
    width: 8px;
    height: 8px;
    border-radius: 50%;
    background: #1a1a1a;
    border: 1px solid #333;
  }

  /* ── Side grip lines ── */
  .grip-lines {
    position: absolute;
    right: 10px;
    top: 50%;
    transform: translateY(-50%);
    display: flex;
    flex-direction: column;
    gap: 5px;
  }
  .grip-line {
    width: 14px;
    height: 2px;
    background: #333;
    border-radius: 1px;
  }

  /* Bottom handle shape */
  .taser-body::after {
    content: '';
    position: absolute;
    bottom: -1px;
    left: 50%;
    transform: translateX(-50%);
    width: 80px;
    height: 20px;
    background: linear-gradient(180deg, #111, #0d0d0d);
    border-radius: 0 0 30px 30px;
    border: 1px solid #2a2a2a;
    border-top: none;
  }

  .status {
    font-size: 12px;
    letter-spacing: 3px;
    color: #444;
    height: 18px;
    transition: color 0.1s;
  }

  .warning {
    font-size: 8px;
    letter-spacing: 2px;
    color: #2a2a2a;
    text-align: center;
  }

  /* ── ZAPPING STATE ── */
  body.zapping {
    background: #1a1400;
  }

  body.zapping .taser-body {
    box-shadow: 0 0 50px rgba(255,230,0,0.6), 0 0 100px rgba(255,230,0,0.2);
    border-color: var(--yellow);
  }

  body.zapping .status {
    color: var(--orange);
    text-shadow: 0 0 10px var(--orange);
  }

  body.zapping .arc {
    opacity: 1;
    animation: arcFlicker 0.06s infinite;
  }

  body.zapping .led {
    background: var(--yellow);
    box-shadow: 0 0 8px var(--yellow);
    animation: ledBlink 0.1s infinite alternate;
  }

  body.zapping .voltage-display {
    color: var(--yellow);
    text-shadow: 0 0 6px var(--yellow);
  }

  body.zapping .trigger-btn {
    box-shadow: 0 0 30px rgba(255,100,0,0.8), inset 0 2px 4px rgba(255,255,255,0.2);
  }

  @keyframes arcFlicker {
    0%   { opacity: 1;   transform: translateX(-50%) scaleX(1)   scaleY(1); }
    25%  { opacity: 0.3; transform: translateX(-48%) scaleX(0.8) scaleY(1.3); }
    50%  { opacity: 0.9; transform: translateX(-52%) scaleX(1.2) scaleY(0.8); }
    75%  { opacity: 0.5; transform: translateX(-49%) scaleX(0.9) scaleY(1.1); }
    100% { opacity: 1;   transform: translateX(-50%) scaleX(1)   scaleY(1); }
  }

  @keyframes ledBlink {
    from { opacity: 1; }
    to   { opacity: 0.2; }
  }
</style>
</head>
<body>
<div id="flash-overlay"></div>

<div class="device">
  <div class="label">Model X-9000</div>

  <div style="position:relative; display:flex; flex-direction:column; align-items:center;">

    <!-- Prongs + arc -->
    <div class="prongs">
      <div class="prong"></div>
      <div class="prong"></div>
    </div>
    <div class="arc" style="position:relative;left:0;top:0;transform:none;width:90px;height:28px;margin-bottom:-4px;">
      <svg viewBox="0 0 90 28" xmlns="http://www.w3.org/2000/svg" width="90" height="28" />
    </div>

    <!-- Taser body with button inside -->
    <div class="taser-body">

      <div class="voltage-display">50,000V</div>

      <!-- Trigger button embedded in body -->
      <div class="btn-guard">
        <button class="trigger-btn" id="triggerBtn" onmousedown="startZap()" onmouseup="stopZap()" ontouchstart="startZap()" ontouchend="stopZap()">
          ZAP
        </button>
      </div>

      <div class="led-row">
        <div class="led"></div>
        <div class="led"></div>
        <div class="led"></div>
        <div class="led"></div>
      </div>

      <!-- Grip detail -->
      <div class="grip-lines">
        <div class="grip-line"></div>
        <div class="grip-line"></div>
        <div class="grip-line"></div>
        <div class="grip-line"></div>
      </div>

    </div>
  </div>

  <div class="status" id="status">READY</div>
  <div class="warning">⚠ PRANK DEVICE ONLY ⚠</div>
</div>

<script>
  const body = document.body;
  const status = document.getElementById('status');
  const flashOverlay = document.getElementById('flash-overlay');
  let zapInterval = null;
  let audioCtx = null;

  function getAudioCtx() {
    if (!audioCtx) audioCtx = new (window.AudioContext || window.webkitAudioContext)();
    return audioCtx;
  }

  function playZapSound() {
    const ctx = getAudioCtx();
    const bufferSize = ctx.sampleRate * 0.12;
    const buffer = ctx.createBuffer(1, bufferSize, ctx.sampleRate);
    const data = buffer.getChannelData(0);

    for (let i = 0; i < bufferSize; i++) {
      const t = i / ctx.sampleRate;
      const noise = (Math.random() * 2 - 1);
      const buzz = Math.sin(2 * Math.PI * 120 * t) * 0.5 +
                   Math.sin(2 * Math.PI * 240 * t) * 0.3 +
                   Math.sin(2 * Math.PI * 480 * t) * 0.2;
      const envelope = Math.exp(-t * 18);
      data[i] = (noise * 0.6 + buzz * 0.4) * envelope;
    }

    const source = ctx.createBufferSource();
    source.buffer = buffer;

    const distortion = ctx.createWaveShaper();
    const curve = new Float32Array(256);
    for (let i = 0; i < 256; i++) {
      const x = (i * 2) / 256 - 1;
      curve[i] = (3 + 200) * x * 20 * (Math.PI / 180) / (Math.PI + 200 * Math.abs(x));
    }
    distortion.curve = curve;

    const gainNode = ctx.createGain();
    gainNode.gain.value = 1.8;

    source.connect(distortion);
    distortion.connect(gainNode);
    gainNode.connect(ctx.destination);
    source.start();
  }

  function flashScreen() {
    flashOverlay.style.opacity = '0.85';
    setTimeout(() => { flashOverlay.style.opacity = '0'; }, 40);
  }

  function startZap() {
    body.classList.add('zapping');
    status.textContent = 'FIRING!';

    function zapCycle() {
      playZapSound();
      flashScreen();
    }

    zapCycle();
    zapInterval = setInterval(zapCycle, 130);

    if (navigator.vibrate) {
      navigator.vibrate([80, 40, 80, 40, 80, 40, 80]);
    }
  }

  function stopZap() {
    body.classList.remove('zapping');
    status.textContent = 'READY';
    clearInterval(zapInterval);
    flashOverlay.style.opacity = '0';
    if (navigator.vibrate) navigator.vibrate(0);
  }

  // Prevent context menu on long press mobile
  document.addEventListener('contextmenu', e => e.preventDefault());
</script>
