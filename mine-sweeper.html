  #grid-container {

  .cell {
    width: 32px; height: 32px;

    border-color: var(--cell-border-light) var(--cell-border-dark) var(--cell-border-dark) var(--cell-border-light);
    border-radius: 3px;
    display: flex; align-items: center; justify-content: center;

  .cell:hover:not(.revealed):not(.flagged) {
    background: #223a55;
    transform: scale(1.05);

  .cell.revealed {
    background: var(--cell-revealed);
    border-color: var(--cell-border-dark) var(--cell-border-light) var(--cell-border-light) var(--cell-border-dark);

  .cell.mine-hit {

  @keyframes explode {
    0% { transform: scale(1); }
    50% { transform: scale(1.3); background: rgba(255,77,109,0.6); }

  .game-wrapper {

  .ad-triggers {

<body>



<div class="title-bar">
  <h1>MINESWEEPER</h1>
  <p>Tactical Grid Clearance System</p>
</div>


<div class="ad-banner-top" id="ad-banner-top">

</div>

<div class="main-wrapper">

  
  <div class="ad-side" id="ad-native">
    ca-app-pub-3209473338250523/3155858590
  </div>

  <!-- GAME -->
  <div class="game-panel">
    <div class="controls">
      <div class="stat-box">
        <div class="stat-label">Mines</div>
        <div class="stat-value danger" id="mine-count">10</div>
      </div>

      <button class="reset-btn" id="reset-btn" title="New Game">‚</button>

      <div class="stat-box">
        <div class="stat-label">Time</div>
        <div class="stat-value timer-val" id="timer">000</div>
      </div>

      <select class="difficulty-select" id="difficulty">
        <option value="beginner">Beginner</option>
        <option value="intermediate">Intermediate</option>
        <option value="expert">Expert</option>
      </select>
    </div>

    <div class="game-wrapper">
      <div id="grid-container">
        <div id="grid"></div>
      </div>

      <div class="message-overlay" id="overlay">
        <h2 id="overlay-title">YOU WIN!</h2>
        <p id="overlay-sub">All mines cleared.</p>
        <button class="play-again-btn" id="play-again-btn">PLAY AGAIN</button>
      </div>
    </div>

    <div class="ad-triggers">
      
      

      
      <div class="ad-trigger-btn interstitial" id="ad-interstitial" onclick="triggerInterstitialAd()">
        Continue
      </div>
    </div>
  </div>

</div>


<div class="ad-banner-bottom" id="ad-banner-bottom">

</div>

<script>
const DIFFICULTIES = {
  beginner:     { rows: 9,  cols: 9,  mines: 10 },
  intermediate: { rows: 16, cols: 16, mines: 40 },
  expert:       { rows: 16, cols: 30, mines: 99 },
};

let config = DIFFICULTIES.beginner;
let board = [], revealed = [], flagged = [], mineLocations = [];
let gameOver = false, firstClick = true;
let timerInterval = null, seconds = 0;
let flagCount = 0;

const gridEl       = document.getElementById('grid');
const mineCountEl  = document.getElementById('mine-count');
const timerEl      = document.getElementById('timer');
const resetBtn     = document.getElementById('reset-btn');
const overlay      = document.getElementById('overlay');
const overlayTitle = document.getElementById('overlay-title');
const overlaySub   = document.getElementById('overlay-sub');

function initGame() {
  clearInterval(timerInterval);
  seconds = 0; gameOver = false; firstClick = true; flagCount = 0;
  timerEl.textContent = '000';
  mineCountEl.textContent = String(config.mines).padStart(3,'0');
  resetBtn.textContent = '';
  overlay.classList.remove('show');
  board     = Array.from({length: config.rows}, () => Array(config.cols).fill(0));
  revealed  = Array.from({length: config.rows}, () => Array(config.cols).fill(false));
  flagged   = Array.from({length: config.rows}, () => Array(config.cols).fill(false));
  mineLocations = [];
  renderGrid();
}

function placeMines(safeR, safeC) {
  let placed = 0;
  while (placed < config.mines) {
    const r = Math.floor(Math.random() * config.rows);
    const c = Math.floor(Math.random() * config.cols);
    if (board[r][c] === -1) continue;
    if (Math.abs(r - safeR) <= 1 && Math.abs(c - safeC) <= 1) continue;
    board[r][c] = -1;
    mineLocations.push([r, c]);
    placed++;
  }
  for (let r = 0; r < config.rows; r++)
    for (let c = 0; c < config.cols; c++)
      if (board[r][c] !== -1) board[r][c] = countMines(r, c);
}

function countMines(r, c) {
  let n = 0;
  for (let dr = -1; dr <= 1; dr++)
    for (let dc = -1; dc <= 1; dc++) {
      const nr = r+dr, nc = c+dc;
      if (nr>=0 && nr<config.rows && nc>=0 && nc<config.cols && board[nr][nc]===-1) n++;
    }
  return n;
}

function renderGrid() {
  gridEl.style.gridTemplateColumns = `repeat(${config.cols}, 32px)`;
  gridEl.innerHTML = '';
  for (let r = 0; r < config.rows; r++)
    for (let c = 0; c < config.cols; c++) {
      const cell = document.createElement('div');
      cell.className = 'cell';
      cell.dataset.r = r; cell.dataset.c = c;
      cell.addEventListener('click', handleClick);
      cell.addEventListener('contextmenu', handleRightClick);
      gridEl.appendChild(cell);
    }
}

function getCell(r, c) {
  return gridEl.querySelector(`[data-r="${r}"][data-c="${c}"]`);
}

function handleClick(e) {
  const r = +e.currentTarget.dataset.r, c = +e.currentTarget.dataset.c;
  if (gameOver || revealed[r][c] || flagged[r][c]) return;
  if (firstClick) { firstClick = false; placeMines(r, c); startTimer(); }
  if (board[r][c] === -1) { triggerLoss(r, c); return; }
  revealCell(r, c);
  checkWin();
}

function handleRightClick(e) {
  e.preventDefault();
  const r = +e.currentTarget.dataset.r, c = +e.currentTarget.dataset.c;
  if (gameOver || revealed[r][c]) return;
  flagged[r][c] = !flagged[r][c];
  flagCount += flagged[r][c] ? 1 : -1;
  updateCell(r, c);
  mineCountEl.textContent = String(config.mines - flagCount).padStart(3,'0');
}

function revealCell(r, c) {
  if (r<0||r>=config.rows||c<0||c>=config.cols||revealed[r][c]||flagged[r][c]) return;
  revealed[r][c] = true;
  updateCell(r, c);
  if (board[r][c] === 0)
    for (let dr=-1;dr<=1;dr++) for(let dc=-1;dc<=1;dc++) revealCell(r+dr,c+dc);
}

function updateCell(r, c) {
  const cell = getCell(r, c);
  cell.className = 'cell';
  if (flagged[r][c]) { cell.classList.add('flagged'); return; }
  if (!revealed[r][c]) return;
  cell.classList.add('revealed');
  if (board[r][c] > 0) { cell.textContent = board[r][c]; cell.classList.add('n' + board[r][c]); }
}

function triggerLoss(r, c) {
  gameOver = true;
  clearInterval(timerInterval);
  resetBtn.textContent = '';
  getCell(r, c).classList.add('mine-hit');
  getCell(r, c).textContent = '';
  mineLocations.forEach(([mr, mc]) => {
    if (mr===r && mc===c) return;
    const cell = getCell(mr, mc);
    cell.classList.add('revealed','mine-revealed');
    cell.textContent = '';
  });
  overlayTitle.textContent = 'GAME OVER';
  overlayTitle.className = 'lose';
  overlaySub.textContent = 'A mine was detonated.';
  setTimeout(() => overlay.classList.add('show'), 600);
}

function checkWin() {
  let unrevealedSafe = 0;
  for (let r=0;r<config.rows;r++)
    for (let c=0;c<config.cols;c++)
      if (!revealed[r][c] && board[r][c] !== -1) unrevealedSafe++;
  if (unrevealedSafe === 0) {
    gameOver = true;
    clearInterval(timerInterval);
    resetBtn.textContent = '';
    overlayTitle.textContent = 'YOU WIN!';
    overlayTitle.className = '';
    overlaySub.textContent = `Cleared in ${seconds}s. All mines avoided.`;
    setTimeout(() => overlay.classList.add('show'), 300);
  }
}

function startTimer() {
  timerInterval = setInterval(() => {
    seconds++;
    timerEl.textContent = String(Math.min(seconds, 999)).padStart(3,'0');
  }, 1000);
}

document.getElementById('difficulty').addEventListener('change', e => {
  config = DIFFICULTIES[e.target.value];
  initGame();
});

resetBtn.addEventListener('click', initGame);
document.getElementById('play-again-btn').addEventListener('click', () => {
  triggerInterstitialAd();
  initGame();
});


function triggerRewardedAd() {
  
}

function triggerInterstitialAd() {
  
}

initGame();

</script>
