<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Relationship Referee — Who's Really Right?</title>
<link href="https://fonts.googleapis.com/css2?family=Bebas+Neue&family=DM+Sans:wght@300;400;500&display=swap" rel="stylesheet">
<style>
  *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }
  :root {
    --black: #0a0a0a;
    --white: #f5f0e8;
    --red: #e8331a;
    --red-dark: #b82a14;
    --gold: #f0c040;
    --green: #27ae60;
    --gray: #1e1e1e;
    --gray-mid: #2e2e2e;
    --gray-light: #666;
  }
  html { scroll-behavior: smooth; }
  body { background: var(--black); color: var(--white); font-family: 'DM Sans', sans-serif; font-weight: 300; min-height: 100vh; overflow-x: hidden; }
  body::before { content: ''; position: fixed; inset: 0; background-image: url("data:image/svg+xml,%3Csvg viewBox='0 0 256 256' xmlns='http://www.w3.org/2000/svg'%3E%3Cfilter id='noise'%3E%3CfeTurbulence type='fractalNoise' baseFrequency='0.9' numOctaves='4' stitchTiles='stitch'/%3E%3C/filter%3E%3Crect width='100%25' height='100%25' filter='url(%23noise)' opacity='0.04'/%3E%3C/svg%3E"); pointer-events: none; z-index: 0; }

  nav { position: fixed; top: 0; left: 0; right: 0; padding: 1.25rem 2rem; display: flex; justify-content: space-between; align-items: center; z-index: 100; border-bottom: 1px solid rgba(255,255,255,0.06); background: rgba(10,10,10,0.9); backdrop-filter: blur(12px); }
  .nav-logo { font-family: 'Bebas Neue', sans-serif; font-size: 22px; letter-spacing: 2px; color: var(--white); }
  .nav-logo span { color: var(--red); }
  .nav-links { display: flex; gap: 1.5rem; align-items: center; }
  .nav-links a { font-size: 13px; color: rgba(245,240,232,0.5); text-decoration: none; transition: color 0.2s; }
  .nav-links a:hover { color: var(--white); }
  .nav-cta { background: var(--red); color: var(--white); font-size: 13px; font-weight: 500; padding: 8px 16px; border-radius: 2px; letter-spacing: 1px; text-decoration: none; transition: background 0.2s; }
  .nav-cta:hover { background: var(--red-dark); }

  /* HERO */
  .hero { min-height: 100vh; display: flex; flex-direction: column; align-items: center; justify-content: center; text-align: center; padding: 8rem 1.5rem 4rem; position: relative; z-index: 1; }
  .gavel-icon { font-size: 56px; margin-bottom: 1.5rem; display: block; animation: gavel 3s ease-in-out infinite; }
  @keyframes gavel { 0%, 100% { transform: rotate(-10deg); } 50% { transform: rotate(10deg); } }
  .eyebrow { font-size: 11px; font-weight: 500; letter-spacing: 4px; text-transform: uppercase; color: var(--red); margin-bottom: 1.25rem; opacity: 0; animation: fadeUp 0.6s ease forwards 0.2s; }
  .hero h1 { font-family: 'Bebas Neue', sans-serif; font-size: clamp(68px, 14vw, 140px); line-height: 0.9; letter-spacing: 2px; color: var(--white); opacity: 0; animation: fadeUp 0.7s ease forwards 0.4s; }
  .hero h1 .red { color: var(--red); }
  .hero-sub { font-size: clamp(16px, 2.5vw, 20px); color: rgba(245,240,232,0.6); max-width: 500px; line-height: 1.6; margin: 1.75rem auto 2.5rem; font-weight: 300; opacity: 0; animation: fadeUp 0.7s ease forwards 0.6s; }

  /* PRICE BADGE */
  .price-badge { display: inline-flex; align-items: center; gap: 10px; background: rgba(240,192,64,0.1); border: 1px solid rgba(240,192,64,0.3); border-radius: 3px; padding: 10px 20px; font-size: 15px; color: var(--gold); margin-bottom: 2rem; opacity: 0; animation: fadeUp 0.7s ease forwards 0.7s; }
  .price-badge strong { font-size: 22px; font-weight: 500; }

  /* BIG CTA BUTTON */
  .cta-btn { display: inline-block; background: var(--red); color: var(--white); font-family: 'Bebas Neue', sans-serif; font-size: 26px; letter-spacing: 3px; padding: 18px 48px; border-radius: 3px; text-decoration: none; transition: background 0.2s, transform 0.1s; opacity: 0; animation: fadeUp 0.7s ease forwards 0.8s; border: none; cursor: pointer; }
  .cta-btn:hover { background: var(--red-dark); transform: translateY(-1px); }
  .cta-sub { font-size: 13px; color: rgba(245,240,232,0.35); margin-top: 0.75rem; opacity: 0; animation: fadeUp 0.7s ease forwards 1s; }

  /* HOW IT WORKS */
  .section { padding: 5rem 1.5rem; max-width: 900px; margin: 0 auto; position: relative; z-index: 1; }
  .section-label { font-size: 11px; font-weight: 500; letter-spacing: 4px; text-transform: uppercase; color: var(--red); text-align: center; margin-bottom: 1rem; }
  .section h2 { font-family: 'Bebas Neue', sans-serif; font-size: clamp(40px, 7vw, 72px); text-align: center; letter-spacing: 2px; margin-bottom: 3.5rem; }
  .steps { display: grid; grid-template-columns: repeat(auto-fit, minmax(200px, 1fr)); gap: 1.5px; background: var(--gray-mid); border: 1.5px solid var(--gray-mid); }
  .step { background: var(--black); padding: 2.5rem 2rem; }
  .step-num { font-family: 'Bebas Neue', sans-serif; font-size: 56px; color: var(--red); line-height: 1; margin-bottom: 1rem; opacity: 0.8; }
  .step h3 { font-family: 'Bebas Neue', sans-serif; font-size: 24px; letter-spacing: 1px; margin-bottom: 0.75rem; color: var(--white); }
  .step p { font-size: 14px; color: rgba(245,240,232,0.5); line-height: 1.7; }

  /* VERDICT PREVIEW */
  .verdict-preview { background: var(--gray); border: 1px solid var(--gray-mid); border-radius: 4px; overflow: hidden; max-width: 560px; margin: 0 auto; }
  .verdict-header { background: var(--red); padding: 1rem 1.5rem; }
  .verdict-header span { font-family: 'Bebas Neue', sans-serif; font-size: 20px; letter-spacing: 2px; }
